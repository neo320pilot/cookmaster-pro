<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CookMaster Pro — AI Cooking Assistant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.msg-enter { animation: fadeIn 0.3s ease; }
textarea:focus { outline: none; border-color: #e8a020 !important; }
button:active { transform: scale(0.97); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #f1f1f1; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const SYSTEM_PROMPT = `You are CookMaster Pro — a world-class professional culinary AI assistant.

When a user asks about any recipe or cooking question, ALWAYS structure your response with these exact sections:

🍽️ RECIPE OVERVIEW
- Dish name, cuisine origin, difficulty level (Beginner/Intermediate/Advanced)
- Total prep time, cook time, total time
- Default serving size

👥 INGREDIENTS (scaled to requested servings)
- List every ingredient with EXACT quantities in both metric (grams/ml) and imperial (oz/cups)
- Note where to buy each ingredient (supermarket, Asian grocery, butcher, etc.)
- Include substitutions where possible

📋 STEP BY STEP METHOD
- Number every step
- Include exact temperatures in both Celsius and Fahrenheit
- Include exact timings for every step
- Describe visual cues (colour, texture, smell, sound) for each step
- Include professional chef tips inline

🌡️ TEMPERATURE & TIMING GUIDE
- Summary of all temperatures and times used

🧊 STORAGE GUIDE
- How to store leftovers (container type, temperature)
- Fridge shelf life (exact days)
- Freezer shelf life (exact weeks/months)
- How to reheat properly with temperatures and times
- Signs food has gone bad

🍱 PORTION GUIDE
- Exact portion size per person in grams
- Portions for: adults, children, elderly, athletes
- Plating presentation tips

🥗 NUTRITION PER SERVING
- Calories, Protein, Carbohydrates, Sugar, Fat, Saturated Fat, Fibre, Sodium
- Health rating out of 10

⚠️ DIETARY & ALLERGEN INFO
- Suitable for: Vegetarian / Vegan / Gluten-Free / Dairy-Free / Halal / Kosher / Keto / Low-Carb / Diabetic-Friendly
- Allergens present
- Modifications for specific diets

❌ COMMON MISTAKES TO AVOID
- List 3-5 most common mistakes home cooks make

Be professional, precise, and thorough. A complete beginner should follow perfectly.`;

const cuisines = ["All","Italian","Indian","Mauritian","Japanese","French","Chinese","Middle Eastern","Thai","Mexican","American","African"];
const diets = ["None","Vegetarian","Vegan","Gluten-Free","Keto","Halal","Diabetic"];
const suggestions = [
  { name: "Mauritian Fish Curry", emoji: "🐟" },
  { name: "Beef Wellington", emoji: "🥩" },
  { name: "Chicken Biryani", emoji: "🍛" },
  { name: "French Croissants", emoji: "🥐" },
  { name: "Japanese Ramen", emoji: "🍜" },
  { name: "Moroccan Tagine", emoji: "🫕" },
  { name: "Thai Green Curry", emoji: "🍲" },
  { name: "Neapolitan Pizza", emoji: "🍕" },
];

function App() {
  const [messages, setMessages] = React.useState([]);
  const [input, setInput] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [started, setStarted] = React.useState(false);
  const [servings, setServings] = React.useState(4);
  const [diet, setDiet] = React.useState("None");
  const [cuisine, setCuisine] = React.useState("All");
  const [apiKey, setApiKey] = React.useState(localStorage.getItem("cm_api_key") || "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");
  const [apiKeyInput, setApiKeyInput] = React.useState("");
  const [showApiScreen, setShowApiScreen] = React.useState(false);
  const bottomRef = React.useRef(null);

  const saveApiKey = () => {
    if (!apiKeyInput.trim()) return;
    localStorage.setItem("cm_api_key", apiKeyInput.trim());
    setApiKey(apiKeyInput.trim());
    setShowApiScreen(false);
  };

  if (showApiScreen) return (
    <div style={{ minHeight:"100vh", background:"#111", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div style={{ background:"#1a1a1a", border:"1px solid #333", borderRadius:16, padding:"48px 40px", maxWidth:480, width:"100%", textAlign:"center" }}>
        <div style={{ width:56, height:56, background:"#e8a020", borderRadius:12, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"1.6rem", margin:"0 auto 20px" }}>🍳</div>
        <h1 style={{ color:"#fff", fontSize:"1.6rem", fontWeight:300, marginBottom:8 }}>CookMaster <span style={{ color:"#e8a020", fontWeight:700 }}>Pro</span></h1>
        <p style={{ color:"#888", fontSize:"0.9rem", lineHeight:1.7, marginBottom:8 }}>To use CookMaster Pro you need an Anthropic API key.</p>
        <div style={{ background:"#111", border:"1px solid #333", borderRadius:10, padding:"16px", marginBottom:20, textAlign:"left" }}>
          <p style={{ color:"#e8a020", fontSize:"0.78rem", fontWeight:700, marginBottom:8 }}>How to get your key:</p>
          <p style={{ color:"#888", fontSize:"0.78rem", lineHeight:1.8 }}>
            1. Go to <a href="https://console.anthropic.com" target="_blank" style={{ color:"#e8a020" }}>console.anthropic.com</a><br/>
            2. Sign in with Google<br/>
            3. Click <strong style={{color:"#fff"}}>"Get API Key"</strong><br/>
            4. Click <strong style={{color:"#fff"}}>"Create API Key"</strong><br/>
            5. Copy and paste it below
          </p>
        </div>
        <input value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveApiKey()}
          placeholder="Paste your API key here (sk-ant-...)"
          style={{ width:"100%", background:"#111", border:"2px solid #333", borderRadius:10, padding:"12px 16px", fontSize:"0.88rem", color:"#fff", outline:"none", marginBottom:12, fontFamily:"monospace", boxSizing:"border-box" }}
          onFocus={e=>e.target.style.borderColor="#e8a020"} onBlur={e=>e.target.style.borderColor="#333"}
        />
        <button onClick={saveApiKey} style={{ width:"100%", background:"#e8a020", border:"none", borderRadius:10, padding:"14px", fontSize:"0.95rem", fontWeight:700, color:"#111", cursor:"pointer" }}>Start Cooking →</button>
        <p style={{ color:"#555", fontSize:"0.72rem", marginTop:16 }}>Your key is stored on your device only. We never store it on our servers.</p>
      </div>
    </div>
  );

  React.useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, loading]);

  const buildPrompt = (text) => {
    let p = text;
    p += `\n\nCooking for: ${servings} people. Scale ALL ingredient quantities for exactly ${servings} people.`;
    if (diet !== "None") p += `\nDietary requirement: ${diet}. Adapt accordingly.`;
    if (cuisine !== "All") p += `\nCuisine: ${cuisine}.`;
    return p;
  };

  const sendMessage = async (text) => {
    const userText = text || input.trim();
    if (!userText || loading) return;
    setStarted(true);
    setInput("");
    const newMessages = [...messages, { role: "user", content: userText }];
    const apiMessages = [
      ...messages.map(m => ({ role: m.role, content: m.content })),
      { role: "user", content: buildPrompt(userText) }
    ];
    setMessages(newMessages);
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 2000,
          system: SYSTEM_PROMPT,
          messages: [...messages.map(m => ({ role: m.role, content: m.content })), { role: "user", content: buildPrompt(userText) }],
        }),
      });
      const data = await res.json();
      const reply = data.content?.[0]?.text || "Sorry, something went wrong. Check your API key is valid.";
      setMessages([...newMessages, { role: "assistant", content: reply }]);
    } catch {
      setMessages([...newMessages, { role: "assistant", content: "Connection error. Please try again." }]);
    }
    setLoading(false);
  };

  const handleKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  };

  const sel = { background:"#fff", border:"1px solid #ddd", borderRadius:8, padding:"8px 12px", fontSize:"0.82rem", color:"#111", cursor:"pointer", outline:"none" };

  return (
    <div style={{ minHeight:"100vh", background:"#f5f5f5", display:"flex", flexDirection:"column" }}>

      {/* HEADER */}
      <div style={{ background:"#111", padding:"0 24px", display:"flex", alignItems:"center", height:60, gap:16, flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:34, height:34, background:"#e8a020", borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"1.1rem" }}>🍳</div>
          <span style={{ color:"#fff", fontWeight:700, fontSize:"1.1rem" }}>CookMaster <span style={{ color:"#e8a020" }}>Pro</span></span>
        </div>
        <div style={{ marginLeft:"auto", display:"flex", gap:16 }}>
          {["World Cuisines","Nutrition","Storage","Portions"].map((t,i) => (
            <span key={i} style={{ color:"#666", fontSize:"0.78rem" }}>{t}</span>
          ))}
        </div>
      </div>

      {/* CONTROLS */}
      <div style={{ background:"#fff", borderBottom:"1px solid #e0e0e0", padding:"10px 24px", display:"flex", gap:14, alignItems:"center", flexWrap:"wrap" }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:"0.75rem", color:"#555", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.08em" }}>Servings</span>
          <div style={{ display:"flex", alignItems:"center", gap:6, background:"#f5f5f5", borderRadius:8, padding:"4px 8px", border:"1px solid #ddd" }}>
            <button onClick={() => setServings(Math.max(1,servings-1))} style={{ background:"none", border:"none", cursor:"pointer", fontSize:"1rem", fontWeight:700, width:22 }}>−</button>
            <span style={{ fontWeight:700, minWidth:20, textAlign:"center" }}>{servings}</span>
            <button onClick={() => setServings(Math.min(50,servings+1))} style={{ background:"none", border:"none", cursor:"pointer", fontSize:"1rem", fontWeight:700, width:22 }}>+</button>
          </div>
          <span style={{ fontSize:"0.73rem", color:"#888" }}>people</span>
        </div>
        <div style={{ width:1, height:24, background:"#e0e0e0" }}/>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:"0.75rem", color:"#555", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.08em" }}>Diet</span>
          <select value={diet} onChange={e=>setDiet(e.target.value)} style={sel}>
            {diets.map(d=><option key={d}>{d}</option>)}
          </select>
        </div>
        <div style={{ width:1, height:24, background:"#e0e0e0" }}/>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:"0.75rem", color:"#555", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.08em" }}>Cuisine</span>
          <select value={cuisine} onChange={e=>setCuisine(e.target.value)} style={sel}>
            {cuisines.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div style={{ marginLeft:"auto", display:"flex", gap:8 }}>
          {["🌡️ Temps","⏱️ Timings","🧊 Storage","💊 Nutrition"].map((b,i)=>(
            <div key={i} style={{ background:"#f5f5f5", border:"1px solid #e0e0e0", borderRadius:6, padding:"4px 10px", fontSize:"0.73rem", color:"#333" }}>{b}</div>
          ))}
        </div>
      </div>

      {/* MAIN */}
      <div style={{ flex:1, display:"flex", flexDirection:"column", maxWidth:900, margin:"0 auto", width:"100%", padding:"0 16px" }}>
        {!started ? (
          <div style={{ padding:"36px 0" }}>
            <div style={{ background:"#111", borderRadius:16, padding:"36px", marginBottom:24, position:"relative", overflow:"hidden" }}>
              <div style={{ position:"absolute", top:-10, right:-10, fontSize:"7rem", opacity:0.05 }}>🍳</div>
              <div style={{ fontSize:"0.7rem", color:"#e8a020", letterSpacing:"0.25em", textTransform:"uppercase", marginBottom:10 }}>Professional Culinary AI</div>
              <h1 style={{ color:"#fff", fontSize:"clamp(1.6rem,4vw,2.4rem)", fontWeight:300, margin:"0 0 10px", lineHeight:1.2 }}>
                Master Any Recipe.<br/><span style={{ color:"#e8a020", fontWeight:700 }}>Cook With Precision.</span>
              </h1>
              <p style={{ color:"#aaa", fontSize:"0.9rem", lineHeight:1.7, maxWidth:480, margin:"0 0 24px" }}>
                Exact temperatures, timings, portions scaled to your guests, full nutrition, storage guides and where to buy every ingredient.
              </p>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                {["Scales for any servings","Full nutrition info","Storage & shelf life","Dietary filters","Where to buy","Allergen warnings","Post-cooking storage","Portion per person"].map((f,i)=>(
                  <div key={i} style={{ background:"rgba(232,160,32,0.12)", border:"1px solid rgba(232,160,32,0.3)", borderRadius:20, padding:"4px 12px", fontSize:"0.72rem", color:"#e8a020" }}>✓ {f}</div>
                ))}
              </div>
            </div>

            <p style={{ fontSize:"0.7rem", color:"#888", letterSpacing:"0.15em", textTransform:"uppercase", marginBottom:12, fontWeight:600 }}>Popular Recipes</p>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(175px,1fr))", gap:10, marginBottom:24 }}>
              {suggestions.map((s,i)=>(
                <button key={i} onClick={()=>sendMessage(`How do I cook ${s.name}? Full detailed recipe please.`)}
                  style={{ background:"#fff", border:"1px solid #e0e0e0", borderRadius:10, padding:"14px 16px", textAlign:"left", cursor:"pointer", display:"flex", alignItems:"center", gap:10, transition:"all 0.2s" }}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor="#e8a020";e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,0.1)"}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="#e0e0e0";e.currentTarget.style.boxShadow="none"}}>
                  <span style={{ fontSize:"1.3rem" }}>{s.emoji}</span>
                  <span style={{ fontSize:"0.83rem", color:"#111", fontWeight:500 }}>{s.name}</span>
                </button>
              ))}
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10 }}>
              {[{num:"195+",label:"Cuisines"},{num:"∞",label:"Recipes"},{num:"14",label:"Features"},{num:"50",label:"Max Servings"}].map((s,i)=>(
                <div key={i} style={{ background:"#fff", border:"1px solid #e0e0e0", borderRadius:10, padding:"16px", textAlign:"center" }}>
                  <div style={{ fontSize:"1.5rem", fontWeight:700, color:"#111" }}>{s.num}</div>
                  <div style={{ fontSize:"0.7rem", color:"#888", textTransform:"uppercase", letterSpacing:"0.1em" }}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>
        ) : (
          <div style={{ flex:1, overflowY:"auto", padding:"24px 0" }}>
            {messages.map((msg,i)=>(
              <div key={i} className="msg-enter" style={{ marginBottom:20, display:"flex", gap:12, justifyContent:msg.role==="user"?"flex-end":"flex-start" }}>
                {msg.role==="assistant" && (
                  <div style={{ width:36, height:36, background:"#e8a020", borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"1rem", flexShrink:0, marginTop:2 }}>🍳</div>
                )}
                <div style={{ maxWidth:"82%", background:msg.role==="user"?"#111":"#fff", color:msg.role==="user"?"#fff":"#111", borderRadius:msg.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px", padding:"14px 18px", fontSize:"0.88rem", lineHeight:1.8, border:msg.role==="assistant"?"1px solid #e0e0e0":"none", whiteSpace:"pre-wrap", boxShadow:"0 2px 8px rgba(0,0,0,0.06)" }}>
                  {msg.content}
                </div>
                {msg.role==="user" && (
                  <div style={{ width:36, height:36, background:"#333", borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"0.75rem", color:"#fff", fontWeight:700, flexShrink:0, marginTop:2 }}>YOU</div>
                )}
              </div>
            ))}
            {loading && (
              <div style={{ display:"flex", gap:12, marginBottom:20 }}>
                <div style={{ width:36, height:36, background:"#e8a020", borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"1rem" }}>🍳</div>
                <div style={{ background:"#fff", border:"1px solid #e0e0e0", borderRadius:"16px 16px 16px 4px", padding:"14px 20px", display:"flex", gap:6, alignItems:"center" }}>
                  {[0,1,2].map(i=>(
                    <div key={i} style={{ width:7, height:7, background:"#e8a020", borderRadius:"50%", animation:`bounce 1.2s infinite`, animationDelay:`${i*0.2}s` }}/>
                  ))}
                  <span style={{ fontSize:"0.78rem", color:"#888", marginLeft:6 }}>Preparing your recipe...</span>
                </div>
              </div>
            )}
            <div ref={bottomRef}/>
          </div>
        )}

        {/* INPUT */}
        <div style={{ padding:"14px 0 20px", borderTop:started?"1px solid #e0e0e0":"none" }}>
          {started && (
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 }}>
              {["Scale for more people","Healthier version?","Storage tips","What can I substitute?","Show nutrition"].map((q,i)=>(
                <button key={i} onClick={()=>sendMessage(q)} style={{ background:"#fff", border:"1px solid #ddd", borderRadius:16, padding:"4px 12px", fontSize:"0.72rem", color:"#333", cursor:"pointer" }}>{q}</button>
              ))}
            </div>
          )}
          <div style={{ display:"flex", gap:10, alignItems:"flex-end" }}>
            <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey}
              placeholder={`Ask for any recipe — scaled for ${servings} people${diet!=="None"?`, ${diet}`:""}...`}
              rows={2}
              style={{ flex:1, border:"2px solid #ddd", borderRadius:12, padding:"12px 16px", fontSize:"0.9rem", fontFamily:"inherit", color:"#111", background:"#fff", resize:"none", lineHeight:1.5, transition:"border-color 0.2s" }}
              onFocus={e=>e.target.style.borderColor="#e8a020"}
              onBlur={e=>e.target.style.borderColor="#ddd"}
            />
            <button onClick={()=>sendMessage()} disabled={loading||!input.trim()}
              style={{ background:loading||!input.trim()?"#ccc":"#e8a020", border:"none", borderRadius:10, width:48, height:48, fontSize:"1.1rem", cursor:loading||!input.trim()?"not-allowed":"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
              ➤
            </button>
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:6 }}>
            <span style={{ fontSize:"0.67rem", color:"#aaa" }}>Enter to send · Shift+Enter for new line</span>
            <span style={{ fontSize:"0.67rem", color:"#aaa" }}>Scaled for <strong style={{ color:"#e8a020" }}>{servings}</strong> people · <strong style={{ color:"#e8a020" }}>{diet}</strong></span>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
